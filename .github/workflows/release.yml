name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS universal binary
        run: wails build -platform darwin/universal

      - name: Zip macOS app
        run: |
          cd build/bin
          zip -r ../../GetDevice-macOS-universal.zip getdevice-api.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: GetDevice-macOS-universal.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows amd64 binary
        run: wails build -platform windows/amd64

      - name: Zip Windows binary
        run: Compress-Archive -Path build/bin/GetDevice.exe -DestinationPath GetDevice-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: GetDevice-windows-amd64.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: GetDevice ${{ steps.tag.outputs.TAG }}
          draft: false
          prerelease: false
          files: |
            macos-build/GetDevice-macOS-universal.zip
            windows-build/GetDevice-windows-amd64.zip
          body: |
            ## GetDevice ${{ steps.tag.outputs.TAG }}

            ### Downloads
            - **macOS** (Intel + Apple Silicon): `GetDevice-macOS-universal.zip`
            - **Windows** (64-bit): `GetDevice-windows-amd64.zip`

            ### macOS Installation
            1. Download and unzip `GetDevice-macOS-universal.zip`
            2. Move `GetDevice.app` to Applications
            3. Right-click → Open (first time, to bypass Gatekeeper)

            ### Windows Installation
            1. Download and unzip `GetDevice-windows-amd64.zip`
            2. Run `GetDevice.exe`
